<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Japan region overlay">
  <style>
    .region-shape path,
    .region-shape polygon,
    .region-shape polyline,
    .region-shape circle,
    .region-shape ellipse,

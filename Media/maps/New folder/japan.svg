    .region-shape.live path,
    .region-shape.live polygon,
    .region-shape.live polyline,
    .region-shape.live circle,
    .region-shape.live ellipse,
    .region-shape.live rect {
      fill: rgba(118,228,208,0.32);
      stroke: rgba(118,228,208,0.92);
      stroke-width: 2;

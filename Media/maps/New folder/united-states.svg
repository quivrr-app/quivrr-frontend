      font-family: Arial, Helvetica, sans-serif;
      font-size: 19px;
      font-weight: 800;
      paint-order: stroke;
      stroke: rgba(18,18,18,0.82);
      stroke-width: 4px;
      text-anchor: middle;
      pointer-events: none;
    }

    .region-code {

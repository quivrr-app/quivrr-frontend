<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" preserveAspectRatio="xMidYMid meet" role="img" aria-label="United Kingdom region overlay">
  <style>
    .region-shape path,
    .region-shape polygon,
    .region-shape polyline,
    .region-shape circle,
    .region-shape ellipse,
    .region-shape rect {
      fill: rgba(243,243,244,0.12);
      stroke: rgba(243,243,244,0.38);
      stroke-width: 1.55;
      vector-effect: non-scaling-stroke;
    }

    .region-shape.live path,
    .region-shape.live polygon,
    .region-shape.live polyline,
    .region-shape.live circle,
    .region-shape.live ellipse,
    .region-shape.live rect {
      fill: rgba(118,228,208,0.32);
      stroke: rgba(118,228,208,0.92);
      stroke-width: 2;
    }

    .region-label {
      fill: rgba(243,243,244,0.96);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 19px;
      font-weight: 800;
      paint-order: stroke;
      stroke: rgba(18,18,18,0.82);
      stroke-width: 4px;
      text-anchor: middle;
      pointer-events: none;
    }

    .region-code {
      font-family: "Courier New", monospace;
      font-size: 17px;
      font-weight: 800;
    }

<svg xmlns="http://www.w3.org/2000/svg" viewBox="1030 470 330 240">
  <defs>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.80 0 0 0 0 0.72 0 0 0 0.65 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <image href="/Media/maps/australia.svg" x="0" y="0" width="1400" height="760" opacity="1" filter="url(#softGlow)" />
</svg>
